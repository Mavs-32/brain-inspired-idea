<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SNN 多智能体前沿</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-4xl mx-auto p-4 flex gap-8">
            <a href="index.html" class="font-bold text-lg text-blue-300 hover:text-white transition-colors pb-1">🏆 经典名人堂</a>
            <a href="latest.html" class="font-bold text-lg text-blue-300 hover:text-white transition-colors pb-1">📡 每日新前沿</a>
            <a href="multiagent.html" class="font-bold text-lg border-b-2 border-white pb-1">🤖 多智能体前沿</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900">SNN 与多智能体/强化学习前沿</h1>
            <p class="text-gray-500 mt-2" id="update-time">正在加载更新时间...</p>
        </header>

        <div id="papers-container" class="space-y-6"></div>
    </div>

    <script>
        fetch('papers.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                document.getElementById('update-time').innerText = `最后更新: ${data.updated}`;
                const container = document.getElementById('papers-container');
                
                // 注意这里读取的是 multi_agent_papers
                data.multi_agent_papers.forEach(paper => {
                    // 使用紫色主题以作区分
                    const card = `
                        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:shadow-lg transition-shadow">
                            <h2 class="text-xl font-semibold text-purple-700 mb-2">
                                <a href="${paper.link}" target="_blank">${paper.title}</a>
                            </h2>
                            <div class="flex items-center space-x-4 mb-4">
                                <span class="text-sm text-gray-500">发表日期: ${paper.published}</span>
                                <span class="text-sm bg-purple-100 text-purple-800 py-1 px-2 rounded-full font-bold">
                                    ⭐ 引用量: ${paper.citations}
                                </span>
                            </div>
                            <div class="bg-purple-50 border-l-4 border-purple-500 p-4 mb-4 rounded-r-md">
                                <p class="text-gray-800 font-medium">${paper.ai_summary}</p>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            })
            .catch(error => {
                const errorMsg = `
                    <div class="bg-red-50 p-4 rounded-md border border-red-200">
                        <h3 class="text-red-800 font-bold">🚨 致命错误抓获：</h3>
                        <p class="text-red-600 mt-2 font-mono">${error.name}: ${error.message}</p>
                        <ul class="text-red-500 text-sm mt-2 list-disc list-inside">
                            <li>如果是 <b>Failed to fetch</b>：说明你是在本地双击打开的，触发了浏览器的跨域安全限制（CORS），或者加了 ?v= 导致找不到文件。</li>
                            <li>如果是 <b>Unexpected token</b> 或 <b>JSON 解析错误</b>：说明你的 papers.json 文件格式坏了（比如少了个括号，或者没生成完）。</li>
                            <li>如果是 <b>Cannot read properties of undefined</b>：说明 JSON 读取成功了，但里面还是没有 multi_agent_papers 这个数据。</li>
                        </ul>
                    </div>
                `;
                document.getElementById('papers-container').innerHTML = errorMsg;
                console.error(error); // 同时输出到控制台
            });
    </script>
</body>
</html>
