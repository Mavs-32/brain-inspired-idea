<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SNN 每日新前沿</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-4xl mx-auto p-4 flex gap-8">
            <a href="index.html" class="font-bold text-lg text-blue-300 hover:text-white transition-colors pb-1">🏆 经典名人堂</a>
            <a href="latest.html" class="font-bold text-lg border-b-2 border-white pb-1">📡 每日新前沿</a>
            <a href="multiagent.html" class="font-bold text-lg text-blue-300 hover:text-white transition-colors pb-1">🤖 多智能体前沿</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900">SNN 每日最新发布速递</h1>
            <p class="text-gray-500 mt-2" id="update-time">正在加载更新时间...</p>
        </header>

        <div id="papers-container" class="space-y-6"></div>
    </div>

    <script>
        fetch('papers.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('update-time').innerText = `最后更新: ${data.updated}`;
                const container = document.getElementById('papers-container');
                
                // 注意这里读取的是 latest_papers
                data.latest_papers.forEach(paper => {
                    const card = `
                        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:shadow-lg transition-shadow">
                            <h2 class="text-xl font-semibold text-blue-700 mb-2">
                                <a href="${paper.link}" target="_blank">${paper.title}</a>
                            </h2>
                            <div class="flex items-center space-x-4 mb-4">
                                <span class="text-sm text-gray-500">发表日期: ${paper.published}</span>
                                <span class="text-sm bg-green-100 text-green-800 py-1 px-2 rounded-full font-bold">
                                    ⭐ 引用量: ${paper.citations} (新文通常较低)
                                </span>
                            </div>
                            <div class="bg-green-50 border-l-4 border-green-500 p-4 mb-4 rounded-r-md">
                                <p class="text-gray-800 font-medium">${paper.ai_summary}</p>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            })
            .catch(error => {
                document.getElementById('papers-container').innerHTML = '<p class="text-red-500">加载失败，请检查数据。</p>';
            });
    </script>
</body>
</html>
